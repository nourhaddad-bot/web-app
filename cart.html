<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - LUMINA Cosmetics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navigation -->
  <nav>
    <div class="logo">LUMINA</div>
    <ul class="nav-links">
      <li><a href="projet.html">Shop</a></li>
      <li><a href="collections.html">Collections</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
  </nav>

  <!-- Cart Section -->
  <section class="cart-section">
    <h1>Your Shopping Cart</h1>
    <p id="cart-message" style="text-align:center; color:green; font-weight:bold;"></p>

    <table class="cart-table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="cart-items">
        <!-- Items will be injected here -->
      </tbody>
    </table>

    <div class="cart-summary">
      <h2 id="cart-total">Cart Total: $0.00</h2>
      <button class="clear-btn">Clear Cart</button>
      <button class="checkout-btn">Proceed to Checkout</button>
    </div>
  </section>

  <script>
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let cartItemsContainer = document.getElementById("cart-items");
    let cartTotalElement = document.getElementById("cart-total");
    let cartMessage = document.getElementById("cart-message");

    function renderCart() {
      cartItemsContainer.innerHTML = "";
      let total = 0;

      if (cart.length > 0) {
        cartMessage.innerText = "Your cart is saved!";
      } else {
        cartMessage.innerText = "Your cart is empty.";
      }

      cart.forEach((item, index) => {
        let row = document.createElement("tr");
        row.innerHTML = `
          <td>${item.name}</td>
          <td>$${item.price.toFixed(2)}</td>
          <td>
            <button class="qty-btn" data-index="${index}" data-action="decrease">-</button>
            ${item.quantity}
            <button class="qty-btn" data-index="${index}" data-action="increase">+</button>
          </td>
          <td>$${(item.price * item.quantity).toFixed(2)}</td>
          <td><button class="remove-btn" data-index="${index}">Remove</button></td>
        `;
        cartItemsContainer.appendChild(row);
        total += item.price * item.quantity;
      });

      cartTotalElement.innerText = "Cart Total: $" + total.toFixed(2);

      
      document.querySelectorAll(".remove-btn").forEach(button => {
        button.addEventListener("click", function() {
          let index = this.getAttribute("data-index");
          cart.splice(index, 1);
          localStorage.setItem("cart", JSON.stringify(cart));
          renderCart();
        });
      });

      
      document.querySelectorAll(".qty-btn").forEach(button => {
        button.addEventListener("click", function() {
          let index = this.getAttribute("data-index");
          let action = this.getAttribute("data-action");

          if (action === "increase") {
            cart[index].quantity += 1;
          } else if (action === "decrease" && cart[index].quantity > 1) {
            cart[index].quantity -= 1;
          }

          localStorage.setItem("cart", JSON.stringify(cart));
          renderCart();
        });
      });
    }

    
    document.querySelector(".clear-btn").addEventListener("click", function() {
      cart = [];
      localStorage.removeItem("cart");
      renderCart();
      alert("Cart cleared!");
    });

    
    document.querySelector(".checkout-btn").addEventListener("click", function() {
      if (cart.length === 0) {
        alert("Your cart is empty. Please add items before checking out.");
      } else {
        alert("Thank you for your order! Your checkout is confirmed.");
        cart = [];
        localStorage.removeItem("cart");
        renderCart();
      }
    });

    renderCart();
  </script>

</body>
</html>
